---
# Git Hooks Installation Tasks
- name: Ensure ~/.config/git/hooks directory exists
  ansible.builtin.file:
    path: "{{ target_home }}/.config/git/hooks"
    state: directory
    mode: '0755'
    owner: "{{ target_user | default(omit) }}"
    group: "{{ target_user | default(omit) }}"
  become: "{{ target_user is defined }}"
  become_user: "{{ target_user | default(omit) }}"
  tags: git-hooks

- name: Install global git hooks
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/.config/git/hooks/"
    dest: "{{ target_home }}/.config/git/hooks/"
    mode: '0755'
    owner: "{{ target_user | default(omit) }}"
    group: "{{ target_user | default(omit) }}"
  become: "{{ target_user is defined }}"
  become_user: "{{ target_user | default(omit) }}"
  tags: git-hooks

- name: Ensure git hooks are executable
  ansible.builtin.file:
    path: "{{ target_home }}/.config/git/hooks/pre-commit"
    mode: '0755'
    owner: "{{ target_user | default(omit) }}"
    group: "{{ target_user | default(omit) }}"
  become: "{{ target_user is defined }}"
  become_user: "{{ target_user | default(omit) }}"
  tags: git-hooks
