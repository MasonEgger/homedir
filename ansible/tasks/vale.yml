---
# ABOUTME: Vale prose linter installation tasks.
# Installs Vale binary (on Linux), ensures vale-styles is cloned in-place at
# ~/Code/vale-styles, and deploys the global .vale.ini that points at it.

# Vale binary installation for Linux (not in apt repos)
- name: Check if Vale is already installed
  ansible.builtin.command: which vale
  register: vale_check
  changed_when: false
  failed_when: false
  tags: vale

- name: Get latest Vale version from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/errata-ai/vale/releases/latest
    return_content: true
  register: vale_release
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
  tags: vale

- name: Create temporary directory for Vale download
  ansible.builtin.tempfile:
    state: directory
    suffix: vale
  register: vale_temp_dir
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
  tags: vale

- name: Download Vale binary for Linux
  ansible.builtin.get_url:
    url: "https://github.com/errata-ai/vale/releases/download/{{ vale_release.json.tag_name }}/vale_{{ vale_release.json.tag_name | regex_replace('^v', '') }}_Linux_64-bit.tar.gz"
    dest: "{{ vale_temp_dir.path }}/vale.tar.gz"
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
  tags: vale

- name: Extract Vale binary
  ansible.builtin.unarchive:
    src: "{{ vale_temp_dir.path }}/vale.tar.gz"
    dest: "{{ vale_temp_dir.path }}"
    remote_src: true
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
  tags: vale

- name: Install Vale binary to /usr/local/bin
  become: true
  ansible.builtin.copy:
    src: "{{ vale_temp_dir.path }}/vale"
    dest: /usr/local/bin/vale
    mode: '0755'
    remote_src: true
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
  tags: vale

- name: Clean up Vale temporary directory
  ansible.builtin.file:
    path: "{{ vale_temp_dir.path }}"
    state: absent
  when:
    - ansible_system == "Linux"
    - vale_check.rc != 0
    - vale_temp_dir.path is defined
  tags: vale

# vale-styles: the canonical ruleset is used in-place from ~/Code/vale-styles.
# The deployed .vale.ini hardcodes that path, so the repo must exist there
# before `vale` runs against any global-fallback file.
- name: Ensure Code directory exists for vale-styles clone
  ansible.builtin.file:
    path: "{{ target_home }}/Code"
    state: directory
    mode: '0755'
    owner: "{{ target_user | default(omit) }}"
    group: "{{ target_user | default(omit) }}"
  become: "{{ target_user is defined }}"
  tags: vale

- name: Ensure vale-styles is cloned in-place at ~/Code/vale-styles
  ansible.builtin.git:
    repo: https://github.com/MasonEgger/vale-styles.git
    dest: "{{ target_home }}/Code/vale-styles"
    update: false   # Mason manages updates manually via `git pull`; ansible only seeds.
  become: "{{ target_user is defined }}"
  when: not ansible_check_mode
  tags: vale

- name: Install .vale.ini configuration
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/.vale.ini"
    dest: "{{ target_home }}/.vale.ini"
    backup: false
    mode: '0644'
    owner: "{{ target_user | default(omit) }}"
    group: "{{ target_user | default(omit) }}"
  become: "{{ target_user is defined }}"
  register: vale_config_installed
  tags: vale

- name: Display Vale installation status
  ansible.builtin.debug:
    msg: "Vale config installed at ~/.vale.ini (points at ~/Code/vale-styles/styles)."
  when: vale_config_installed.changed
  tags: vale
