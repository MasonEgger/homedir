---
# ABOUTME: Per-user tool installs via curl scripts and npm.
# Installs Oh My Zsh, Claude Code CLI, uv, and Todoist CLI into the target user's home directory.

# Oh My Zsh
- name: Install Oh My Zsh (target user)
  ansible.builtin.shell: >-
    su - {{ target_user }} -s /bin/sh -c
    'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'
  args:
    creates: "{{ target_home }}/.oh-my-zsh"
  become: true
  changed_when: true
  when: target_user is defined and not ansible_check_mode
  tags: user-tools

- name: Install Oh My Zsh (current user)
  ansible.builtin.shell: >
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "{{ target_home }}/.oh-my-zsh"
  changed_when: true
  when: target_user is not defined and not ansible_check_mode
  tags: user-tools

# Claude Code CLI
# No versioned installer URL available — always installs latest
- name: Check if Claude Code CLI is installed
  ansible.builtin.stat:
    path: "{{ target_home }}/.claude/local/bin/claude"
  register: claude_cli_check
  tags: user-tools

- name: Install Claude Code CLI (target user)
  ansible.builtin.shell: >-
    su - {{ target_user }} -s /bin/bash -c 'curl -fsSL https://claude.ai/install.sh | bash'
  become: true
  changed_when: true
  when: target_user is defined and not claude_cli_check.stat.exists and not ansible_check_mode
  tags: user-tools

- name: Install Claude Code CLI (current user)
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
  changed_when: true
  when: target_user is not defined and not claude_cli_check.stat.exists and not ansible_check_mode
  tags: user-tools

# uv Python package manager (installs to ~/.local/bin which isn't in Ansible's PATH)
- name: Check if uv is installed
  ansible.builtin.stat:
    path: "{{ target_home }}/.local/bin/uv"
  register: uv_check
  tags: user-tools

- name: Install uv Python package manager (target user)
  ansible.builtin.shell: >-
    su - {{ target_user }} -s /bin/bash -c 'curl -LsSf https://astral.sh/uv/install.sh | sh'
  become: true
  changed_when: true
  when: target_user is defined and not uv_check.stat.exists and not ansible_check_mode
  tags: user-tools

- name: Install uv Python package manager (current user)
  ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  changed_when: true
  when: target_user is not defined and not uv_check.stat.exists and not ansible_check_mode
  tags: user-tools

# Todoist CLI (official Doist npm package)
- name: Check if Todoist CLI is installed
  ansible.builtin.shell: command -v td
  register: todoist_cli_check
  changed_when: false
  failed_when: false
  tags: user-tools

- name: Install Todoist CLI (target user)
  ansible.builtin.shell: >-
    su - {{ target_user }} -s /bin/bash -c 'npm install -g @doist/todoist-cli'
  become: true
  changed_when: true
  when: target_user is defined and todoist_cli_check.rc != 0 and not ansible_check_mode
  tags: user-tools

- name: Install Todoist CLI (current user)
  ansible.builtin.shell: npm install -g @doist/todoist-cli
  changed_when: true
  when: target_user is not defined and todoist_cli_check.rc != 0 and not ansible_check_mode
  tags: user-tools
