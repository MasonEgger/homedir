---
- name: Homedir Setup - Dotfiles and Package Management
  hosts: localhost
  gather_facts: true
  become: false

  # Variables are now loaded automatically from group_vars/all.yml

  tasks:
    # Include modular tasks
    - name: Include package management tasks
      ansible.builtin.include_tasks: tasks/packages.yml
      tags: packages

    - name: Include Oh My Zsh tasks
      ansible.builtin.include_tasks: tasks/oh-my-zsh.yml
      tags: oh-my-zsh

    - name: Include core dotfiles tasks
      ansible.builtin.include_tasks: tasks/dotfiles.yml
      tags: dotfiles

    - name: Include .claude directory tasks
      ansible.builtin.include_tasks: tasks/claude.yml
      tags: claude

    - name: Include .homedir directory tasks
      ansible.builtin.include_tasks: tasks/homedir.yml
      tags: homedir

    - name: Include Vale configuration tasks
      ansible.builtin.include_tasks: tasks/vale.yml
      tags: vale

    - name: Include git hooks tasks
      ansible.builtin.include_tasks: tasks/git-hooks.yml
      tags: git-hooks

    - name: Include Tailscale tasks
      ansible.builtin.include_tasks: tasks/tailscale.yml
      tags: tailscale

    - name: Include mmegger user setup tasks (Debian only)
      ansible.builtin.include_tasks: tasks/mmegger.yml
      when: ansible_os_family == "Debian"
      tags: [never, mmegger]

    # Summary
    - name: Installation summary
      ansible.builtin.debug:
        msg:
          - "=== Installation Summary ==="
          - "OS: {{ ansible_os_family }}"
          - "Packages installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'packages' in ansible_run_tags else 'Skipped' }}"
          - "Oh My Zsh installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'oh-my-zsh' in ansible_run_tags else 'Skipped' }}"
          - "Core dotfiles installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'dotfiles' in ansible_run_tags else 'Skipped' }}"
          - "Claude directory installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'claude' in ansible_run_tags else 'Skipped' }}"
          - "Homedir directory installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'homedir' in ansible_run_tags else 'Skipped' }}"
          - "Vale configuration installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'vale' in ansible_run_tags else 'Skipped' }}"
          - "Git hooks installed: {{ 'Yes' if ansible_run_tags == ['all'] or 'git-hooks' in ansible_run_tags else 'Skipped' }}"
          - "Tailscale installed/updated: {{ 'Yes' if ansible_run_tags == ['all'] or 'tailscale' in ansible_run_tags else 'Skipped' }}"
          - "mmegger user setup (Debian): {{ 'Yes' if 'mmegger' in ansible_run_tags else 'Skipped' }}"
          - ""
          - "{{ 'Setup complete! You may need to:' if not ansible_check_mode else 'This was a check mode run. To actually install, run without --check' }}"
          - "{{ '- Restart your shell or run: source ~/.zshrc' if not ansible_check_mode else '' }}"
          - "{{ '- Check that custom commands in ~/.homedir/ work as expected' if not ansible_check_mode else '' }}"
          - "{{ '- Verify Vale works with: vale --version' if not ansible_check_mode else '' }}"
      tags: always