# ABOUTME: Vale prose linter configuration. Global fallback used by `vale`
# when run from a directory without its own `.vale.ini`. Mirrors the
# canonical template at ~/Code/vale-styles/.vale.ini.template so the global
# fallback enforces the same shared rules as project-local configs.
#
# Per-project overrides (turning a rule off, raising/lowering a severity, or
# adding a project-only glob) belong in that project's own .vale.ini after
# copying the template.

StylesPath = /home/mmegger/Code/vale-styles/styles

# error | warning | suggestion
MinAlertLevel = suggestion

# Treat these formats as Markdown for parsing purposes.
# Slidev decks are valid Markdown; MDX is Markdown with JSX; Quarto is Markdown.
[formats]
mdx = md
qmd = md
slidev = md

# --- Defaults --------------------------------------------------------------
# Applies to any .md not matched by a more specific section below.
[*.md]
BasedOnStyles = MasonBase
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Blog drafts -----------------------------------------------------------
# Personal, expressive voice. Relaxations derived from running MasonBase
# against Mason's published blog posts (first person, adverbs, future tense,
# rhetorical "there is", no mandatory Conclusion).
[{drafts/blogs,blog,blogs}/**/*.md]
BasedOnStyles = MasonBase, MasonBlog
MasonBase.FirstPerson = NO
MasonBase.We = NO
MasonBase.Weasel = NO
MasonBase.Adverbs = NO
MasonBase.Modals = suggestion
MasonBase.Passive = suggestion
MasonBase.Wordy = suggestion
MasonBase.Condescending = suggestion
MasonBase.ThereIs = suggestion
MasonBase.FirstUse = suggestion
MasonBase.Conclusion = NO
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Technical writing -----------------------------------------------------
# Tutorials, how-tos, reference. Strict: second person, no "learn how to",
# code sandwich, no AI/marketing filler, no emoji, colon-separator step
# headings. MasonBase is already tuned for this register, so MasonTechnical
# only adds.
[{tutorials,tutorial,technical,how-to,howto}/**/*.md]
BasedOnStyles = MasonBase, MasonTechnical
MasonBase.We = suggestion
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Books -----------------------------------------------------------------
# Longer-form: relax sentence-length caps; check chapter structure.
[{book,books}/**/*.md]
BasedOnStyles = MasonBase, MasonBook
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Slides ----------------------------------------------------------------
# Slidev decks, talk outlines, presentation-style markdown.
[{slides,decks,talks}/**/*.md]
BasedOnStyles = MasonBase, MasonSlides
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

[**/*.slidev.md]
BasedOnStyles = MasonBase, MasonSlides
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Courses / workshops ---------------------------------------------------
# STUB: MasonCourse holds no rules yet. Wired so course material picks up the
# layer automatically once it is derived from real workshop content.
[{courses,course,workshops,workshop}/**/*.md]
BasedOnStyles = MasonBase, MasonCourse
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)

# --- Social media ----------------------------------------------------------
# STUB: MasonSocial holds no rules yet. Social is the loosest register and
# will OVERRIDE most of MasonBase once built. Until then it inherits
# MasonBase, which is too strict for social copy.
[{social,socials,posts/social}/**/*.md]
BasedOnStyles = MasonBase, MasonSocial
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\x60[^\n\x60]+\x60)
